spring.application.name=datingapp

# 数据库驱动
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库地址（改成你自己的MySQL库名，我先帮你建 datingapp）
spring.datasource.url=jdbc:mysql://localhost:3306/datingapp?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&useSSL=false

# MySQL 账号密码（改成你自己的！）
spring.datasource.username=root
spring.datasource.password=root

# JPA 配置（自动建表，超级方便）
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
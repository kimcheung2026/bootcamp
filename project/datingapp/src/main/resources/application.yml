server:
  port: 8080
  servlet:
    session:
      cookie:
        max-age: -1
        http-only: true
        path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/datingapp?useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
<form action="/user/register" method="post" enctype="multipart/form-data">
    
    <!-- 錯誤訊息提示 -->
    <div th:if="${errorMessage}" style="color: white; background-color: #ff4d4d; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
        <span th:text="${errorMessage}"></span>
    </div>

    <div>
        <label>登錄帳號</label>
        <!-- 對應 length=50 -->
        <input type="text" name="username" maxlength="50" required placeholder="5-50位字符">
    </div>

    <div>
        <label>登錄密碼</label>
        <!-- 對應 length=100 (通常存加密後的，但前端可限制輸入長度) -->
        <input type="password" name="password" maxlength="100" required>
    </div>

    <div>
        <label>用戶暱稱</label>
        <!-- 對應 length=30 -->
        <input type="text" name="nickname" maxlength="30">
    </div>

    <div>
        <label>用戶頭像</label>
        <!-- 改用 accept 限制圖片格式 -->
        <input type="file" name="avatarFile" accept="image/*">
    </div>

    <div>
        <label>性別</label>
        <!-- 根據 Java 註解：MALE, FEMALE, OTHER -->
        <select name="gender">
            <option value="OTHER">保密</option>
            <option value="MALE">男</option>
            <option value="FEMALE">女</option>  
        </select>
    </div>

    <div>
        <label>生日</label>
        <!-- type="date" 與 Java LocalDate 完美對接 -->
        <input type="date" name="birthday">
    </div>

    <div>
        <label>郵箱</label>
        <!-- 對應 length=50 -->
        <input type="email" name="email" maxlength="50">
    </div>

    <div>
        <label>手機號碼</label>
        <!-- 對應 length=20，增加正規表達式驗證範例 -->
        <input type="tel" name="phone" maxlength="20" pattern="[0-9\-+]*">
    </div>

    <form action="/user/register" method="post" enctype="multipart/form-data">
    
    <!-- ... 前面的欄位保留 ... -->

    <!-- MBTI 下拉選單 -->
    <div>
        <label>MBTI 人格類型</label>
        <select name="mbti">
            <option value="">請選擇</option>
            <optgroup label="分析家 (NT)">
                <option value="INTJ">INTJ (建築師)</option>
                <option value="INTP">INTP (邏輯學家)</option>
                <option value="ENTJ">ENTJ (指揮官)</option>
                <option value="ENTP">ENTP (辯論家)</option>
            </optgroup>
            <optgroup label="外交家 (NF)">
                <option value="INFJ">INFJ (提倡者)</option>
                <option value="INFP">INFP (調停者)</option>
                <option value="ENFJ">ENFJ (主人公)</option>
                <option value="ENFP">ENFP (競選者)</option>
            </optgroup>
            <optgroup label="守護者聯盟 (SJ)">
              <option value="ISTJ">ISTJ (監督者/檢查員)</option>
                <option value="ISFJ">ISFJ (保護者/照顧者)</option>
                <option value="ESTJ">ESTJ (總經理/行政官)</option>
                <option value="ESFJ">ESFJ (執政官/服務者)</option>
            </optgroup>
            <optgroup label="探險家 (SP)">
              <option value="ISTP">ISTP (工匠/解決者)</option>
                <option value="ISFP">ISFP (冒險家/藝術家)</option>
                <option value="ESTP">ESTP (企業家)</option>
                <option value="ESFP">ESFP (表演者)</option>
            </optgroup>
                
        </select>
    </div>

    <!-- 興趣標籤 (List<String>) -->
    <div>
        <label>興趣愛好 (多選)</label>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
            <label><input type="checkbox" name="interests" value="旅遊"> 旅遊</label>
            <label><input type="checkbox" name="interests" value="美食"> 美食</label>
            <label><input type="checkbox" name="interests" value="健身"> 健身</label>
            <label><input type="checkbox" name="interests" value="電影"> 電影</label>
            <label><input type="checkbox" name="interests" value="音樂"> 音樂</label>
            <label><input type="checkbox" name="interests" value="遊戲"> 遊戲</label>
        </div>
    </div>

    <button type="submit">註冊帳號</button>
</form>

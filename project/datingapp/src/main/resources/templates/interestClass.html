<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
      xmlns:sec="http://thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>興趣班管理 - 商家中心</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .header { background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .class-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>商家管理後台</h1>
        <p>歡迎回來，<span sec:authentication="name" style="font-weight: bold; color: blue;">商家名</span>！</p>
        <p>權限等級：<span sec:authentication="principal.authorities"></span></p>
        <a href="/logout" style="color: red;">登出系統</a>
    </div>

    <h2>我的興趣班列表</h2>
    <div class="class-card">
        <h3>目前尚無課程資料</h3>
        <p>點擊下方按鈕開始建立您的第一個興趣班。</p>
    </div>

    <br>
    <a href="/home" class="btn">返回首頁</a>
    <button class="btn" style="background-color: #28a745;">＋ 新增課程</button>

</body>
</html>

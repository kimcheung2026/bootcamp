<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>發布新課程</title>
    <style>
        .form-group { margin: 12px 0; }
        label { display: inline-block; width: 110px; font-weight: bold; }
        input, textarea, select { width: 350px; padding: 6px; }
        textarea { height: 100px; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>發布新課程</h2>

    <!-- 成功/錯誤訊息 -->
    <div th:if="${success}" style="color: green; margin: 10px 0;">
        課程發布成功！
    </div>
    <div th:if="${error}" style="color: red; margin: 10px 0;" th:text="${error}"></div>

    <form th:action="@{/course/publish}" method="post">
        <div class="form-group">
            <label>課程標題：</label>
            <input type="text" name="title" required placeholder="輸入課程名稱">
        </div>

        <div class="form-group">
            <label>課程描述：</label>
            <textarea name="description" required placeholder="課程介紹"></textarea>
        </div>

        <div class="form-group">
            <label>課程價格：</label>
            <input type="number" step="0.01" name="price" required placeholder="0.00">
        </div>

        <div class="form-group">
            <label>封面圖片 URL：</label>
            <input type="url" name="coverImage" placeholder="https://...">
        </div>

        <h3 style="margin-top: 25px;">新增上課時段</h3>

        <div class="form-group">
            <label>上課日期：</label>
            <input type="date" name="scheduleDate" required>
        </div>

        <div class="form-group">
            <label>開始時間：</label>
            <input type="time" name="startTime" required>
        </div>

        <div class="form-group">
            <label>結束時間：</label>
            <input type="time" name="endTime" required>
        </div>

        <div class="form-group">
            <label>上課地點：</label>
            <input type="text" name="location" placeholder="教室/地點">
        </div>

        <button type="submit" style="margin-top: 20px;">發布課程</button>
    </form>

    <br>
    <a th:href="@{/home}">返回首頁</a>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商家註冊</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: inline-block; width: 100px; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>商家帳號註冊</h2>

    <!-- 顯示錯誤訊息 (例如帳號已存在) -->
    <div th:if="${errorMessage}" style="color: red; margin-bottom: 10px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <!-- ✅ 這裡修正：開頭加 / -->
    <form th:action="@{/merchant/register}" method="post" th:object="${merchantForm}">
        <div class="form-group">
            <label>商店名稱:</label>
            <input type="text" name="storeName" required placeholder="例如：好食餐飲"/>
        </div>

        <div class="form-group">
            <label>商業登記證 (BR):</label>
            <input type="text"
                   name="brNumber"
                   required
                   pattern="\d{8}"
                   title="請輸入 8 位數字的商業登記證"
                   placeholder="請輸入 8 位統編"/>
            <small style="color: gray;">(Business Registration Number)</small>
        </div>

        <div class="form-group">
            <label>登入帳號:</label>
            <input type="text" name="username" required placeholder="建議使用 Email"/>
        </div>

        <div class="form-group">
            <label>登入密碼:</label>
            <input type="password" name="password" required minlength="6"/>
        </div>

        <div class="form-group">
            <label>聯絡電話:</label>
            <input type="tel" name="phone" required/>
        </div>

        <button type="submit">確認註冊</button>
    </form>

    <p>已有帳號？ <a th:href="@{/login}">返回登入</a></p>
</body>
</html>

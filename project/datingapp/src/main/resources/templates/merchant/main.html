<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>商家後台 - 發佈課程</title>
    <!-- 引入 Bootstrap 讓畫面好看 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 30px;
        }
        .card {
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 0 12px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header text-center">
        商家課程發佈系統
    </div>
    <div class="card-body">
        <form action="/merchant/course/create" method="post" enctype="multipart/form-data">
            
            <!-- 課程名稱 -->
            <div class="mb-3">
                <label class="form-label">課程名稱</label>
                <input type="text" name="courseName" class="form-control" required>
            </div>

            <!-- 課程分類 -->
            <div class="mb-3">
                <label class="form-label">課程分類</label>
                <select name="category" class="form-select" required>
                    <option value="">請選擇分類</option>
                    <option value="健身">健身</option>
                    <option value="才藝">才藝</option>
                    <option value="語言">語言</option>
                    <option value="烹飪">烹飪</option>
                    <option value="專業技能">專業技能</option>
                </select>
            </div>

            <!-- 課程講師 -->
            <div class="mb-3">
                <label class="form-label">授課講師</label>
                <input type="text" name="teacher" class="form-control" required>
            </div>

            <!-- 課程價格 -->
            <div class="mb-3">
                <label class="form-label">課程價格</label>
                <input type="number" name="price" class="form-control" required>
            </div>

            <!-- 上課地點 -->
            <div class="mb-3">
                <label class="form-label">上課地點</label>
                <input type="text" name="location" class="form-control" required>
            </div>

            <!-- 上課時間 -->
            <div class="mb-3">
                <label class="form-label">上課時間</label>
                <input type="datetime-local" name="courseTime" class="form-control" required>
            </div>

            <!-- 課程簡介 -->
            <div class="mb-3">
                <label class="form-label">課程簡介</label>
                <textarea name="description" rows="4" class="form-control" required></textarea>
            </div>

            <!-- 課程圖片 -->
            <div class="mb-3">
                <label class="form-label">上傳課程封面</label>
                <input type="file" name="coverImage" class="form-control" accept="image/*">
            </div>

            <!-- 發佈按鈕 -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">發佈課程</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>忘記密碼</title>
    <style>
        .container { margin: 50px; }
        .form-group { margin-bottom: 15px; }
        .msg-success { color: green; }
        .msg-error { color: red; }
    </style>
</head>
<body>
    <div class="container">
        <h2>重設密碼</h2>
        <p>請輸入您註冊時使用的電子信箱，我們將寄送重設指示給您。</p>

        <!-- 顯示成功或錯誤訊息 -->
        <div th:if="${successMessage}" class="msg-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="msg-error" th:text="${errorMessage}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label>電子信箱 (Email):</label>
                <input type="email" name="email" required placeholder="example@mail.com"/>
            </div>
            <button type="submit">發送重設郵件</button>
        </form>

        <p><a th:href="@{/login}">返回登入頁面</a></p>
    </div>
</body>
</html>

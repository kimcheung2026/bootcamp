<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head><title>管理員審核系統</title></head>
<body>
    <h1>待審核商家清單</h1>
    <table border="1">
        <thead>
            <tr>
                <th>商家名稱</th>
                <th>BRN (商業登記證)</th>
                <th>負責人</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="m : ${merchants}">
                <td th:text="${m.merchantName}"></td>
                <td th:text="${m.brNumber}"></td>
                <td th:text="${m.ownerName}"></td>
                <td>
                    <form th:action="@{'/admin/merchants/verify/' + ${m.id}}" method="post">
                        <button type="submit">通過審核</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(merchants)}">目前沒有待審核的商家。</p>
    <a href="/home">返回首頁</a>
</body>
</html>

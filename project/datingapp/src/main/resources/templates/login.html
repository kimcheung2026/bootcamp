<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>系統登入</title>
    <style>
        div { margin: 10px 0; }
    </style>
</head>
<body>
    <h2>系統登入</h2>

    <!-- 登入失敗 -->
    <div th:if="${param.error}" style="color: red;">
        帳號或密碼錯誤
    </div>

    <!-- 登出成功 -->
    <div th:if="${param.logout}" style="color: green;">
        您已成功登出
    </div>

    <!-- 登入過期 / 失效 -->
    <div th:if="${param.expired}" style="color: orange;">
        已自動登出，請重新登入
    </div>
    <div th:if="${param.invalid}" style="color: red;">
        登入已失效，請重新登入
    </div>

    <!-- 登入表單 -->
    <form th:action="@{/login}" method="post">
        <div>
            <label>帳號:</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>密碼:</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">登入</button>
    </form>

    <p>還沒有帳號？ <a th:href="@{/register}">一般用戶註冊</a></p>

    <p>您是商家嗎？
        <a th:href="@{/merchant/register}" style="color: blue; font-weight: bold;">
            商家入駐
        </a>
    </p>

    <p><a th:href="@{/forgot-password}">忘記密碼？</a></p>

</body>
</html>
